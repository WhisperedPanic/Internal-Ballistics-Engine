# .github/workflows/build-wasm.yml
name: Build LSODA WASM Solver (via rusoda)

on:
  push:
    branches: [main, develop]
    paths:
      - 'js/solvers/lsodaSolver.js'
      - 'js/solvers/wasm/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

env:
  CARGO_TERM_COLOR: always
  WASM_OUT_DIR: js/solvers/wasm
  RUSODA_REPO: https://github.com/ElliotLaw/rusoda
  RUSODA_REF: main  # Pin to tag for reproducibility later

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-rusoda-${{ hashFiles('js/solvers/wasm/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-rusoda-

      - name: Install Rust + wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo install wasm-pack --locked

      - name: Create minimal Rust wrapper for rusoda
        run: |
          mkdir -p js/solvers/wasm
          cat > js/solvers/wasm/Cargo.toml << 'EOF'
          [package]
          name = "ballistics-lsoda"
          version = "0.1.0"
          edition = "2021"
          
          [lib]
          crate-type = ["cdylib"]
          
          [dependencies]
          rusoda = "0.1"
          wasm-bindgen = "0.2"
          console_error_panic_hook = "0.1"
          EOF
          
          cat > js/solvers/wasm/src/lib.rs << 'EOF'
          use wasm_bindgen::prelude::*;
          use rusoda::{LSODA, IStateInput};
          
          #[wasm_bindgen]
          pub fn init_panic_hook() {
              console_error_panic_hook::set_once();
          }
          
          #[wasm_bindgen]
          pub struct LsodaSolver {
              solver: LSODA,
          }
          
          #[wasm_bindgen]
          impl LsodaSolver {
              #[wasm_bindgen(constructor)]
              pub fn new(neq: i32, rtol: f64, atol: f64) -> LsodaSolver {
                  LsodaSolver {
                      solver: LSODA::new(neq, rtol, atol),
                  }
              }
              
              #[wasm_bindgen]
              pub fn solve(
                  &mut self,
                  y0: &[f64],
                  t0: f64,
                  tf: f64,
                  max_steps: i32,
              ) -> JsValue {
                  // Minimal wrapper - expand for your ODE system
                  serde_wasm_bindgen::to_value(&serde_json::json!({
                      "success": true,
                      "message": "rusoda wrapper ready - implement ode_fn callback"
                  })).unwrap()
              }
          }
          EOF
          
          mkdir -p js/solvers/wasm/src
          echo "Created minimal rusoda wrapper"

      - name: Build WASM with wasm-pack
        run: |
          cd js/solvers/wasm
          wasm-pack build --target web --release --out-dir .
          # Verify outputs
          test -f ballistics_lsoda.js || exit 1
          test -f ballistics_lsoda_bg.wasm || exit 1
          echo "✓ WASM build successful"

      - name: Add build metadata
        run: |
          echo "Built: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > js/solvers/wasm/BUILD_INFO.txt
          echo "rusoda: $(cargo search rusoda --limit 1 | head -1)" >> js/solvers/wasm/BUILD_INFO.txt

      - name: Commit generated files
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if ! git diff --quiet js/solvers/wasm/; then
            git add js/solvers/wasm/ballistics_lsoda.js \
                    js/solvers/wasm/ballistics_lsoda_bg.wasm \
                    js/solvers/wasm/BUILD_INFO.txt \
                    js/solvers/wasm/Cargo.toml \
                    js/solvers/wasm/src/
            git commit -m "chore: auto-build rusoda WASM solver [skip ci]
            
            Source: rusoda crate via crates.io
            Built: $(date -u +"%Y-%m-%d %H:%M UTC")
            "
            git push
            echo "✓ Committed WASM artifacts"
          else
            echo "✓ No changes to WASM artifacts"
          fi

      - name: Upload artifacts (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasm-build-${{ github.run_number }}
          path: js/solvers/wasm/
          retention-days: 7